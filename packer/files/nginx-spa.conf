# ============================================================================
# nginx-spa.conf
#
# SPA-friendly site config for a React build served from /var/www/html.
# Key features:
#   - try_files fallback to index.html (React Router refresh fix)
#   - long cache headers on hashed assets
#   - no-cache on index.html so deployments take effect immediately
#   - gzip on common text types
#   - basic security headers
#   - health endpoint at /healthz for the Azure Load Balancer probe
# ============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html;

    # Health check endpoint — used by Azure LB probe
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Hashed static assets (Vite emits assets/*.{hash}.{ext}) — cache forever
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static files — short cache
    location ~* \.(?:ico|gif|jpe?g|png|webp|svg|css|js|woff2?|ttf|otf)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback — every unknown route serves index.html
    location / {
        # No cache on index.html so deploys are immediate
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;
}
